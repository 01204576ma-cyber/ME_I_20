<!DOCTYPE html>
<html lang="ja">
<head<link rel="manifest" href="./manifest.json">>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="ME:I Ticket">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#ffffff">

<title>ME:I Ticket</title>

<style>

/*
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

ME:I Ticket Template
Version 2.1

Created for まりちゃん ❤️

【フォルダ構成】

index.html     ← 一覧ページ
ticket.html    ← このページ
top.jpg
bottom.JPG

━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
*/

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#ffffff;
}

body{
    -webkit-text-size-adjust:100%;
    overscroll-behavior:none;
}

.ticket-app{

    display:flex;
    flex-direction:column;

    width:100%;
    height:100vh;
    height:100dvh;

    overflow:hidden;
    background:#ffffff;

}

/* -------------------
   上固定
-------------------- */

.ticket-top{

    flex:0 0 auto;

    width:100%;
    overflow:hidden;

}

.ticket-top img{

    display:block;
    width:100%;
    height:auto;

    user-select:none;
    -webkit-user-select:none;
    -webkit-user-drag:none;

}

/* -------------------
   下スクロール
-------------------- */

.ticket-scroll{

    flex:1 1 auto;
    min-height:0;

    overflow-y:auto;
    overflow-x:hidden;

    -webkit-overflow-scrolling:touch;

    background:#ffffff;

}

.ticket-scroll img{

    display:block;
    width:100%;
    height:auto;

    user-select:none;
    -webkit-user-select:none;
    -webkit-user-drag:none;

}

/* -------------------
   ×ボタン
-------------------- */

.close-link{

    position:fixed;

    top:5%;
    right:3.5%;

    width:13%;
    aspect-ratio:1;

    z-index:9999;

    background:transparent;

    -webkit-tap-highlight-color:transparent;

}

</style>
</head>

<body>

<!-- ×を押すと一覧へ戻る -->
<a
class="close-link"
href="./index.html"
aria-label="一覧へ戻る">
</a>

<div class="ticket-app">

    <div class="ticket-top">

        <img
        src="./top.jpg"
        draggable="false">

    </div>

    <div class="ticket-scroll">

        <img
        src="./bottom.JPG"
        draggable="false">

    </div>

</div>

</body>
</html>
